name: 🚀 Flutter Android CI

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  android-release:
    name: Build Signed Android AppBundle
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------
      # Checkout Repository
      # ---------------------------------------
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ---------------------------------------
      # Java
      # ---------------------------------------
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      # ---------------------------------------
      # Flutter
      # ---------------------------------------
      - name: 💙 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.1"
          cache: true

      # ---------------------------------------
      # Flutter Version
      # ---------------------------------------
      - name: 📋 Flutter Version
        run: flutter --version

      # ---------------------------------------
      # Install Packages
      # ---------------------------------------
      - name: 📦 Get Dependencies
        run: flutter pub get

      # ---------------------------------------
      # Create Keystore Folder
      # ---------------------------------------
      - name: 📁 Create Keystore Directory
        run: mkdir -p android/keystore

      # ---------------------------------------
      # Decode Keystore
      # ---------------------------------------
      - name: 🔐 Decode Android Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 --decode > android/keystore/linkora-key.jks

      # ---------------------------------------
      # Create key.properties
      # ---------------------------------------
      - name: 📝 Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=../keystore/linkora-key.jks
          EOF

      # ---------------------------------------
      # Analyze
      # ---------------------------------------
      - name: 🔍 Analyze Project
        run: flutter analyze --no-fatal-infos

      # ---------------------------------------
      # Build Signed Bundle
      # ---------------------------------------
      - name: 📱 Build Signed AppBundle
        run: flutter build appbundle --release --obfuscate --split-debug-info=build/debug_info

      # ---------------------------------------
      # Upload Artifact
      # ---------------------------------------
      - name: 📤 Upload Signed AppBundle
        uses: actions/upload-artifact@v4
        with:
          name: Linkora-Signed-AAB
          path: build/app/outputs/bundle/release/app-release.aab

      # ---------------------------------------
      # Build Summary
      # ---------------------------------------
      - name: ✅ Build Summary
        run: |
          echo "Signed Android AppBundle created successfully."
          ls -lh build/app/outputs/bundle/release/
